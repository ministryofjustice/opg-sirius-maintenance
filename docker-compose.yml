services:
  maintenance:
    image: 311462405659.dkr.ecr.eu-west-1.amazonaws.com/sirius/maintenance:latest
    build: .
    ports: ["8888:8080"]
    privileged: false
    user: app
    environment:
      PORT: 8080
      HEALTHCHECK: /health-check


  gosec:
    image: securego/gosec:latest@sha256:2cf71ea78210c496c65e3a987576a9c8317b68e20f2960520b3f6f8f9f539be5
    working_dir: /app
    volumes:
      - .:/app
    command: -exclude-dir=.gocache /app/...

  go-lint:
    image: golangci/golangci-lint:v2.11.4@sha256:67dfc9eeeb0eb13fc1a36329c2c378197dc561f1edf1a7792e3f771606bb0e15
    working_dir: /go/src/app
    volumes:
      - ./:/go/src/app
      - ./.cache/golangci-lint/v1.53.3:/root/.cache
    command: golangci-lint run -v --timeout 5m
